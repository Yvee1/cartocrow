name: Linux

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-26.04
    strategy:
      matrix:
        compiler:
          - g++-11
          - clang-16
    steps:
    - uses: actions/checkout@v6
    - name: Install C++ compiler
      run: |
        sudo apt-get update
        apt-cache search '^clang-[0-9]+$' | sort -V
        sudo apt-get install -y ${{ matrix.compiler }}
        if [[ "${{ matrix.compiler }}" == clang* ]]; then
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler }}" >> $GITHUB_ENV
        else
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler }}" >> $GITHUB_ENV
        fi
    - name: Check C++ compiler version
      run: $CXX --version
    - name: Install dependencies
      run: |
        sudo apt install -y build-essential cmake
        sudo apt install -y libcgal-dev nlohmann-json3-dev qtbase5-dev
        sudo apt install -y libpq-dev gdal-bin libgdal-dev
    - name: Install ipelib
      run: |
        mkdir -p /tmp/deps
        cd /tmp/deps
        wget https://github.com/otfried/ipe/archive/refs/tags/v7.2.30.zip
        unzip v7.2.30
        cd ipe-7.2.30
        sudo apt-get install -y build-essential checkinstall
        sudo apt-get install -y qt6-base-dev qt6-base-dev-tools
        sudo apt-get install -y libqt6svg6
        sudo apt-get install -y libfreetype6-dev libcairo2-dev libjpeg8-dev
        sudo apt-get install -y libpng-dev liblua5.4-dev zlib1g-dev
        sudo apt-get install -y libspiro-dev libgsl-dev curl
        cd src
        make IPEPREFIX=/usr/local
        sudo make install IPEPREFIX=/usr/local
        sudo ldconfig
        cd ../..
    - name: Install CavalierContours
      run: |
        cd /tmp/deps
        git clone https://github.com/jbuckmccready/CavalierContours.git
        cd CavalierContours
        sudo cp -R include/cavc /usr/local/include
    - name: Build CartoCrow core
      run: cmake -DCMAKE_BUILD_TYPE=Debug -S . -B build
    - name: Test CartoCrow core
      run: build/test/cartocrow_test
